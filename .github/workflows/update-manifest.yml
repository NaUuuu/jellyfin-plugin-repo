name: Update StrmTool Manifest

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for new StrmTool jellyfin release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_JSON=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/jinlin-teck/StrmTool/releases" \
            | jq '[.[] | select(.tag_name | contains("jellyfin"))] | sort_by(.published_at) | reverse | .[0]')

          if [ "$RELEASE_JSON" = "null" ] || [ -z "$RELEASE_JSON" ]; then
            echo "has_update=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
          PUBLISHED=$(echo "$RELEASE_JSON" | jq -r '.published_at')

          VERSION=$(echo "$TAG" | sed 's/^v//' | sed 's/-jellyfin//')
          DOTS=$(echo "$VERSION" | tr -cd '.' | wc -c)
          if [ "$DOTS" -eq 2 ]; then
            VERSION="${VERSION}.0"
          fi

          DLL_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | test("StrmTool.*\\.dll$"; "i")) | .browser_download_url' | head -1)

          if [ -z "$DLL_URL" ]; then
            echo "has_update=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT_VERSION=""
          if [ -f manifest.json ]; then
            CURRENT_VERSION=$(jq -r '.[0].versions[0].version // ""' manifest.json)
          fi

          if [ "$VERSION" = "$CURRENT_VERSION" ]; then
            echo "has_update=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "$RELEASE_JSON" | jq -r '.body // "Bug fixes and improvements"' > /tmp/changelog.txt

          echo "has_update=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "published=$PUBLISHED" >> "$GITHUB_OUTPUT"
          echo "dll_url=$DLL_URL" >> "$GITHUB_OUTPUT"

      - name: Download DLL and create zip
        if: steps.check.outputs.has_update == 'true'
        run: |
          mkdir -p StrmTool
          curl -L -o StrmTool/StrmTool.dll "${{ steps.check.outputs.dll_url }}"
          zip -j StrmTool.zip StrmTool/StrmTool.dll
          CHECKSUM=$(md5sum StrmTool.zip | awk '{print $1}')
          echo "checksum=$CHECKSUM" >> "$GITHUB_ENV"

      - name: Update manifest.json
        if: steps.check.outputs.has_update == 'true'
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          TAG="${{ steps.check.outputs.tag }}"
          PUBLISHED="${{ steps.check.outputs.published }}"
          REPO="${{ github.repository }}"
          SOURCE_URL="https://github.com/${REPO}/releases/download/${TAG}/StrmTool.zip"
          CHANGELOG=$(head -5 /tmp/changelog.txt | tr '\n' ' ' | tr '\r' ' ')

          jq -n \
            --arg guid "6107fc8c-883a-4171-b70e-7590658706b9" \
            --arg desc "Extract media technical information (codec, resolution, subtitles) from strm files to enhance library display and playback performance." \
            --arg overview "Strm Media Info Extraction & Cache" \
            --arg version "$VERSION" \
            --arg changelog "$CHANGELOG" \
            --arg targetAbi "10.11.0.0" \
            --arg sourceUrl "$SOURCE_URL" \
            --arg checksum "$CHECKSUM" \
            --arg timestamp "$PUBLISHED" \
            '[{
              guid: $guid,
              name: "StrmTool",
              description: $desc,
              overview: $overview,
              owner: "jinlin-teck",
              category: "General",
              imageUrl: "",
              versions: [{
                version: $version,
                changelog: $changelog,
                targetAbi: $targetAbi,
                sourceUrl: $sourceUrl,
                checksum: $checksum,
                timestamp: $timestamp
              }]
            }]' > manifest.json

      - name: Create Release and upload zip
        if: steps.check.outputs.has_update == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.check.outputs.tag }}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" StrmTool.zip \
            --title "StrmTool ${{ steps.check.outputs.version }}" \
            --notes "Synced from [jinlin-teck/StrmTool](https://github.com/jinlin-teck/StrmTool/releases/tag/$TAG)"

      - name: Commit manifest
        if: steps.check.outputs.has_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --cached --quiet && exit 0
          git commit -m "Update StrmTool to ${{ steps.check.outputs.version }}"
          git push
