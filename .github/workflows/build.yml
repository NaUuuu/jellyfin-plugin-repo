name: Build and Release StrmTool

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Get upstream commit SHA
        id: upstream
        run: |
          SHA=$(curl -s "https://api.github.com/repos/jinlin-teck/StrmTool/commits/jellyfin" | jq -r '.sha')
          SHORT_SHA=${SHA:0:7}
          DATE=$(curl -s "https://api.github.com/repos/jinlin-teck/StrmTool/commits/jellyfin" | jq -r '.commit.committer.date')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Check if rebuild needed
        id: check
        run: |
          LAST_SHA=""
          if [ -f .last-build-sha ]; then
            LAST_SHA=$(cat .last-build-sha)
          fi
          if [ "$LAST_SHA" = "${{ steps.upstream.outputs.sha }}" ]; then
            echo "need_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "need_build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout upstream source
        if: steps.check.outputs.need_build == 'true'
        uses: actions/checkout@v4
        with:
          repository: jinlin-teck/StrmTool
          ref: jellyfin
          path: upstream

      - name: Setup .NET
        if: steps.check.outputs.need_build == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from csproj
        if: steps.check.outputs.need_build == 'true'
        id: version
        run: |
          cd upstream
          VERSION=$(grep -oP '(?<=<AssemblyVersion>)[^<]+' StrmTool.csproj | head -1 || true)
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -oP '(?<=<FileVersion>)[^<]+' StrmTool.csproj | head -1 || true)
          fi
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -oP '(?<=<Version>)[^<]+' StrmTool.csproj | head -1 || true)
          fi
          if [ -z "$VERSION" ]; then
            VERSION="0.0.0.0"
          fi
          DOTS=$(echo "$VERSION" | tr -cd '.' | wc -c)
          while [ "$DOTS" -lt 3 ]; do
            VERSION="${VERSION}.0"
            DOTS=$(echo "$VERSION" | tr -cd '.' | wc -c)
          done
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}-${{ steps.upstream.outputs.short_sha }}" >> "$GITHUB_OUTPUT"

      - name: Build
        if: steps.check.outputs.need_build == 'true'
        run: |
          cd upstream
          dotnet restore
          dotnet publish StrmTool.csproj -c Release -o ../build -p:DebugType=None -p:DebugSymbols=false

      - name: Package DLL
        if: steps.check.outputs.need_build == 'true'
        run: |
          if [ ! -f build/StrmTool.dll ]; then
            echo "Build failed - StrmTool.dll not found"
            ls -la build/
            exit 1
          fi
          cd build
          zip ../StrmTool.zip StrmTool.dll
          cd ..
          CHECKSUM=$(md5sum StrmTool.zip | awk '{print $1}')
          echo "checksum=$CHECKSUM" >> "$GITHUB_ENV"

      - name: Create release
        if: steps.check.outputs.need_build == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" StrmTool.zip \
            --title "StrmTool ${{ steps.version.outputs.version }}" \
            --notes "Built from upstream commit [${{ steps.upstream.outputs.short_sha }}](https://github.com/jinlin-teck/StrmTool/commit/${{ steps.upstream.outputs.sha }}) on the jellyfin branch."

      - name: Update manifest.json
        if: steps.check.outputs.need_build == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          TIMESTAMP="${{ steps.upstream.outputs.date }}"
          REPO="${{ github.repository }}"
          SOURCE_URL="https://github.com/${REPO}/releases/download/${TAG}/StrmTool.zip"
          CHANGELOG="Auto-built from upstream commit ${{ steps.upstream.outputs.short_sha }}"

          jq -n \
            --arg guid "6107fc8c-883a-4171-b70e-7590658706b9" \
            --arg desc "Extract media technical information (codec, resolution, subtitles) from strm files to enhance library display and playback performance." \
            --arg overview "Strm Media Info Extraction & Cache" \
            --arg version "$VERSION" \
            --arg changelog "$CHANGELOG" \
            --arg targetAbi "10.11.0.0" \
            --arg sourceUrl "$SOURCE_URL" \
            --arg checksum "$CHECKSUM" \
            --arg timestamp "$TIMESTAMP" \
            '[{
              guid: $guid,
              name: "StrmTool",
              description: $desc,
              overview: $overview,
              owner: "jinlin-teck",
              category: "General",
              imageUrl: "",
              versions: [{
                version: $version,
                changelog: $changelog,
                targetAbi: $targetAbi,
                sourceUrl: $sourceUrl,
                checksum: $checksum,
                timestamp: $timestamp
              }]
            }]' > manifest.json

          echo "${{ steps.upstream.outputs.sha }}" > .last-build-sha

      - name: Commit changes
        if: steps.check.outputs.need_build == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json .last-build-sha
          git diff --cached --quiet && exit 0
          git commit -m "Build StrmTool ${{ steps.version.outputs.version }} (${{ steps.upstream.outputs.short_sha }})"
          git push
